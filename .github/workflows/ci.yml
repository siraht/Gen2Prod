name: CI

on:
  push:
  pull_request:

jobs:
  runtime-matrix:
    name: Bun ${{ matrix.bun }} / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, bun: "1.2.22" }
          - { os: ubuntu-latest, bun: "1.3.14" }
          - { os: macos-latest, bun: "1.3.14" }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.23.0 }
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: "${{ matrix.bun }}" }
      - run: pnpm install --frozen-lockfile
      - run: bun run contracts:verify-package
      - run: bun run check
      - run: bun run test:unit
      - run: bun run build

  full-release-gate:
    name: Full browser/integration gate / Bun 1.3.14 / ubuntu
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.23.0 }
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: "1.3.14" }
      - run: pnpm install --frozen-lockfile
      - run: bun run verify
