name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.23.0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: pnpm install --frozen-lockfile
      - run: bun run verify
